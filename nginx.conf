server {
  listen 88;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve SPA routes via index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache built assets aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}

