services:
  - type: static
    name: jobby-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_APP_BASE_URL
        sync: false
      - key: VITE_AUTH_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
