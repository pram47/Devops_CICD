services:
  - type: static
    name: jobby-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_APP_BASE_URL
        sync: false
      - key: VITE_AUTH_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false

  - type: web
    name: jobby-employer-bff
    runtime: node
    rootDir: Back/jobby-employer-bff
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4444
      - key: AUTH_JWT_SECRET
        sync: false
      - key: JOBBY_DB_POSTGRES_URL
        sync: false
