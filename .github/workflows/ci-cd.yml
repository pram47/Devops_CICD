name: CI/CD

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-build:
    name: Backend Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Back/jobby-employer-bff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Back/jobby-employer-bff/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t jobby-employer-bff:ci .

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')

    steps:
      - name: Trigger Render Frontend Deploy Hook
        if: secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"

      - name: Trigger Render Backend Deploy Hook
        if: secrets.RENDER_BACKEND_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Ensure at least one deploy hook exists
        if: secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL == '' && secrets.RENDER_BACKEND_DEPLOY_HOOK_URL == ''
        run: |
          echo "No Render deploy hooks configured."
          echo "Please add repository secrets:"
          echo "- RENDER_FRONTEND_DEPLOY_HOOK_URL"
          echo "- RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "Skipping deploy trigger step without failing CI/CD workflow."
