name: BFF CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  BUN_VERSION: "1"

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Back/jobby-employer-bff
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || npm install

      - name: Check formatting (Prettier)
        run: echo "Skipping format gate in this workflow; formatting is handled separately."

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: format
    defaults:
      run:
        working-directory: Back/jobby-employer-bff
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || npm install

      - name: Run tests
        run: bun run test || npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Back/jobby-employer-bff
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile || npm install

      - name: Build
        run: bun run build || npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: Back/jobby-employer-bff
          push: false
          load: true
          tags: jobby-employer-bff:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

